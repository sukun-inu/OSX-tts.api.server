# ================================================================
# OSX TTS API — nginx サイト設定
#
# 配置先 (Homebrew nginx):
#   Apple Silicon : /opt/homebrew/etc/nginx/servers/tts-api.conf
#   Intel Mac     : /usr/local/etc/nginx/servers/tts-api.conf
#   (nginx.conf の http{} ブロックに `include servers/*;` がある前提)
#
# 反映手順:
#   nginx -t            # 構文チェック
#   nginx -s reload     # 設定リロード
#
# !! 設定前に「CHANGEME」箇所を環境に合わせて修正すること !!
# ================================================================

upstream tts_api_backend {
    # FastAPI (uvicorn) の待ち受け先。app/config.py の host:port と一致させる。
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ---- アクセス制御: LAN 内のみ許可 ------------------------------
    # 利用するネットワークのサブネットに合わせて調整すること。
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny  all;

    # 読み上げテキスト用。リクエストボディを十分小さく制限する。
    client_max_body_size 64k;

    # 一時ファイル (/audio/.tmp-*) など隠しファイルへのアクセスを拒否。
    # 正規表現 location は前方一致 location より優先される。
    location ~ /\. {
        deny all;
    }

    # ---- 音声ファイルの直接配信 (高速パス) -------------------------
    # FastAPI を経由せず nginx がディスクから直接返す。
    # alias のパスは app/config.py の audio_dir (絶対パス) と一致させること。
    location /audio/ {
        alias /Users/CHANGEME/Desktop/Develop/OSX-tts.api.server/audio/;  # !! CHANGEME !!

        # 拡張子ごとの Content-Type (標準 mime.types を補完)
        types {
            audio/aiff aiff;
            audio/wav  wav;
            audio/mp4  m4a;
            audio/mpeg mp3;
        }
        default_type application/octet-stream;

        add_header Cache-Control "public, max-age=3600" always;
        add_header Accept-Ranges  bytes always;
    }

    # ---- API: FastAPI へリバースプロキシ ---------------------------
    location /api/ {
        proxy_pass http://tts_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection         "";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 60s;
    }

    # ルート / OpenAPI ドキュメント (/docs, /openapi.json) も FastAPI へ。
    location / {
        proxy_pass http://tts_api_backend;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
